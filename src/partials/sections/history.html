<section class="history section" id="history" aria-labelledby="history-title" data-history>
  <div class="container history__container">
    <div class="eyebrow">
      <svg width="16" height="16" aria-hidden="true">
        <use href="#icon-triangle"></use>
      </svg>
      <span class="eyebrow-text">История компании</span>
    </div>

    <h2 class="history__title title-h2" id="history-title">
      Ключевые этапы развития компании с момента основания
    </h2>

    <div class="history__layout">
      <div class="history__hero-year" aria-hidden="true" data-history-current-year-desktop>
        2023
      </div>

      <div class="history__panel" id="history-panel">
        <div class="history__panel-year" aria-hidden="true" data-history-current-year-mobile>
          2023
        </div>

        <div class="history__timeline" role="tablist" aria-label="Этапы развития компании">
          <button
            class="history__year is-active"
            type="button"
            data-history-trigger
            data-history-year="2023"
            data-history-text="Описание этапа. Здесь будет ваш текст для этого года."
            aria-pressed="true"
          >
            2023
          </button>
          <button
            class="history__year"
            type="button"
            data-history-trigger
            data-history-year="2024"
            data-history-text="Описание этапа. Здесь будет ваш текст для этого года."
            aria-pressed="false"
          >
            2024
          </button>
          <button
            class="history__year"
            type="button"
            data-history-trigger
            data-history-year="2025"
            data-history-text="Описание этапа. Здесь будет ваш текст для этого года."
            aria-pressed="false"
          >
            2025
          </button>
          <button
            class="history__year"
            type="button"
            data-history-trigger
            data-history-year="2026"
            data-history-text="Описание этапа. Здесь будет ваш текст для этого года."
            aria-pressed="false"
          >
            2026
          </button>
        </div>

        <div class="history__body">
          <div class="history__actions">
            <button
              class="history__arrow history__arrow--prev"
              type="button"
              data-history-prev
              aria-label="Показать предыдущий этап"
            >
              &larr;
            </button>
            <button
              class="history__arrow history__arrow--next"
              type="button"
              data-history-next
              aria-label="Показать следующий этап"
            >
              &rarr;
            </button>
          </div>

          <div class="history__content" aria-live="polite">
            <p class="history__text" data-history-current-text>
              Описание этапа. Здесь будет ваш текст для этого года.
            </p>

            <div
              class="history__pagination"
              data-history-pagination
              aria-label="Навигация по этапам"
            ></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<form class="request-form{{ form_class }}" data-request-form novalidate>
  <div class="request-form__fields">
    <div class="request-form__field">
      <label class="request-form__label" for="{{ form_prefix }}-name">Ваше имя</label>
      <input
        class="request-form__input"
        id="{{ form_prefix }}-name"
        name="name"
        type="text"
        autocomplete="name"
        placeholder="Ваше имя"
      />
    </div>
    <div class="request-form__row">
      <div class="request-form__field">
        <label class="request-form__label" for="{{ form_prefix }}-phone">Телефон</label>
        <input
          class="request-form__input"
          id="{{ form_prefix }}-phone"
          name="phone"
          type="tel"
          autocomplete="tel"
          placeholder="Телефон"
        />
      </div>
      <div class="request-form__field">
        <label class="request-form__label" for="{{ form_prefix }}-email">Email</label>
        <input
          class="request-form__input"
          id="{{ form_prefix }}-email"
          name="email"
          type="email"
          autocomplete="email"
          placeholder="Email"
        />
      </div>
    </div>
    <div class="request-form__field">
      <label class="request-form__label" for="{{ form_prefix }}-company">Название компании</label>
      <input
        class="request-form__input"
        id="{{ form_prefix }}-company"
        name="company"
        type="text"
        autocomplete="organization"
        placeholder="Название компании"
      />
    </div>
    <div class="request-form__field">
      <label class="request-form__label" for="{{ form_prefix }}-message">Сообщение</label>
      <textarea
        class="request-form__input request-form__input--textarea"
        id="{{ form_prefix }}-message"
        name="message"
        rows="4"
        placeholder="Сообщение"
      ></textarea>
    </div>
  </div>

  <div class="request-form__meta">
    <div class="request-form__file">
      <input
        class="request-form__file-input"
        id="{{ form_prefix }}-file"
        name="file"
        type="file"
        accept=".pdf,.doc,.docx,.xls,.xlsx"
      />
      <label class="request-form__file-button" for="{{ form_prefix }}-file">
        <svg width="24" height="24" aria-hidden="true">
          <use href="#icon-file-add"></use>
        </svg>
        <span>Прикрепить файл (PDF, DOCX, XLSX)</span>
      </label>
      <p class="request-form__file-name" data-file-name>Файл не выбран</p>
    </div>

    <div class="request-form__checkbox-row">
      <label class="request-form__checkbox">
        <input
          class="request-form__checkbox-input"
          id="{{ form_prefix }}-policy"
          name="policy"
          type="checkbox"
        />
        <span class="request-form__checkbox-box" aria-hidden="true"></span>
        <span class="request-form__checkbox-text">
          Нажимая кнопку «Отправить», я даю
          <a href="/" class="request-form__policy-link"
            >согласие на обработку персональных данных</a
          >
          и подтверждаю ознакомление с
          <a href="/" class="request-form__policy-link">политикой конфиденциальности</a>
        </span>
      </label>
    </div>
  </div>

  <button class="button-primary request-form__submit" type="submit">
    <span class="button-primary__icon" aria-hidden="true"></span>
    <span class="button-primary__text">Отправить данные</span>
    <span class="button-primary__loader" aria-hidden="true"></span>
  </button>
</form>
